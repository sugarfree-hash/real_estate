<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>物件データ一覧</title>
    <style>
        /* 少しだけ見栄えを良くするCSS */
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>🏢 ダミー物件データ一覧</h1>
    <p>Javaの重回帰分析ロジックで生成したデータです。</p>

    <table>
        <tr>
            <th>ID</th>
            <th>家賃 (万円)</th>
            <th>築年数 (年)</th>
            <th>駅距離 (km)</th>
            <th>専有面積 (m²)</th>
        </tr>
        {% for house in houses %}
        <tr>
            <td>{{ house.id }}</td>
            <td>{{ house.rent }}</td>
            <td>{{ house.age }}</td>
            <td>{{ house.distance }}</td>
            <td>{{ house.layout }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
